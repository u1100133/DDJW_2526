<!DOCTYPE html> 
<html>
	<head>
		<script src="./js/main.js" type="module"></script>
		<link rel="stylesheet" 
			href="./styles/main.css">
		<title> Memory - Menú </title>
	</head>
	<body>
		<h1 id="title">Menú</h1>
		<button id="play" class="center"> Jugar </button>
		<button id="options" class="center"> Opcions </button>
		<button id="saves" class="center"> Partides </button>
		<button id="ranking" class="center"> Puntuacions </button>
		<button id="exit" class="center"> Sortir </button>
		
		<div id="rankingContainer" style="display:none; margin-top: 2rem; text-align: center;">
			<h2 style="color: #01597b;">Top 5 Puntuacions</h2>
			<div id="rankingContent" style="background: white; padding: 15px; border-radius: 8px; max-width: 300px; margin: 0 auto;"></div>
			<button id="closeRanking" class="center" style="background-color: #d32f2f;">Tancar</button>
		</div>

		<div id="saveListContainer" style="display:none; margin-top: 2rem; text-align: center;">
            <h2 style="color: #01579b;">Partides Guardades</h2>
            <div id="saveList" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                </div>
            <button id="closeSaves" class="center" style="background-color: #d32f2f;">Tancar</button>
        </div>
	</body>
</html>
